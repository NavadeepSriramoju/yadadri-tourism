server.port=8080

# H2 in-memory database (no setup needed)
spring.datasource.url=jdbc:h2:mem:yadadridb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret (change this in production!)
app.jwt.secret=YadadriTempleSecretKey2025SuperLongSecretForJWTSigning
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Allow circular references for development
spring.main.allow-circular-references=true
